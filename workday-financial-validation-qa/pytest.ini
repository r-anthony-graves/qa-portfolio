[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    gross_net: Gross to net reconciliation
    tax: Tax calculation accuracy
    headcount: Headcount reconciliation
    terminated: Terminated employee validation
    gl: GL entry reconciliation
log_cli = true
log_cli_level = INFO
