[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    crud: CRUD roundtrip behavior
    contract: JSON Schema contract compliance
    negative: Invalid-input and error-path handling
    auth: Authentication and authorization
    idempotency: HTTP idempotency semantics
    defects: Seeded defect detection on the /legacy surface
    live: Live tier against Restful-Booker (network; skips when unreachable)
log_cli = true
log_cli_level = INFO
