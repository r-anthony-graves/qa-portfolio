[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    hours: Time entry hours validation
    matter: Matter status enforcement
    billing: Billing rate calculation
    utbms: UTBMS code compliance
    invoice: Invoice total reconciliation
log_cli = true
log_cli_level = INFO
