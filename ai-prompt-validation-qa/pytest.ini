[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    factual: Factual accuracy tests
    refusal: Refusal behavior tests
    format: Format compliance tests
    hallucination: Hallucination detection tests
    pii: PII safety tests
    bias: Bias detection tests
    performance: Response performance tests
log_cli = true
log_cli_level = INFO
