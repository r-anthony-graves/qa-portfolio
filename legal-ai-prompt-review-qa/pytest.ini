[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    accuracy: Factual accuracy evaluation
    hallucination: Hallucination detection
    citation: Citation quality
    confidence: Confidence calibration
    score: Score distribution
log_cli = true
log_cli_level = INFO
