[pytest]
testpaths = tests
addopts =
    --html=artifacts/report.html
    --self-contained-html
    --tb=short
    -v
markers =
    count: Record count reconciliation
    mapping: Field mapping validation
    null: Null and empty field checks
    duplicate: Duplicate detection
    integrity: Referential integrity
    business: Business rule validation
log_cli = true
log_cli_level = INFO
